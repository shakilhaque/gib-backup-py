version: "3.9"

services:
  # ──────────────────────────────
  # PostgreSQL database
  # ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gib_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backup_user
      POSTGRES_PASSWORD: backup_pass
      POSTGRES_DB: backup_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup_user -d backup_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────
  # FastAPI backend
  # ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gib_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://backup_user:backup_pass@postgres:5432/backup_db
    volumes:
      # Persist backup files on the host
      - ./backups:/app/backups
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────
  # React frontend (nginx)
  # ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gib_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
